<!DOCTYPE html>
<html>
<head>
<title>Ultimate Math Challenge</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.app{
background:#1e293b;
width:420px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
background:#334155;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#475569;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
}

#quizScreen{display:none;}
#result{display:none;}

#timer{
color:#38bdf8;
font-size:20px;
margin:10px 0;
}

#scoreBox{
color:#22c55e;
font-weight:bold;
}

#progressBar{
width:100%;
background:#334155;
height:10px;
border-radius:5px;
margin:10px 0;
}

#progress{
height:10px;
background:#22c55e;
width:0%;
border-radius:5px;
transition:0.3s;
}

#feedback{
min-height:40px;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<!-- WELCOME SCREEN -->
<div id="welcomeScreen">

<h2>🧠 Ultimate Math Challenge</h2>

<p>10 Questions • 5 Minute Timer • XP System</p>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
<option value="expert">Expert</option>
</select>

<button onclick="startQuiz()">Start Quiz</button>

<p id="highScore"></p>

</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen">

<div id="timer">05:00</div>
<div id="scoreBox">Score: 0 | XP: 0 | Level: 1</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<h3 id="question"></h3>

<div id="options"></div>

<div id="feedback"></div>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">
Next Question
</button>

</div>

<!-- RESULT SCREEN -->
<div id="result"></div>

</div>

<script>

// ===== STORAGE =====
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText =
"🏆 High Score: " + highScore;

// ===== QUESTION BANK =====
const bank = {

easy: [
{q:"12 + 8",a:"20"},
{q:"5 × 6",a:"30"},
{q:"50 ÷ 5",a:"10"},
{q:"9 + 7",a:"16"},
{q:"15 - 6",a:"9"},
{q:"3 × 4",a:"12"},
{q:"18 ÷ 2",a:"9"},
{q:"7 + 8",a:"15"},
{q:"10 × 2",a:"20"},
{q:"14 - 5",a:"9"}
],

medium: [
{q:"15 × 12",a:"180"},
{q:"144 ÷ 12",a:"12"},
{q:"25 × 16",a:"400"},
{q:"18²",a:"324"},
{q:"√144",a:"12"},
{q:"45 + 67",a:"112"},
{q:"200 - 89",a:"111"},
{q:"32 × 3",a:"96"},
{q:"100 ÷ 4",a:"25"},
{q:"17 × 6",a:"102"}
],

hard: [
{q:"12² + 5²",a:"169"},
{q:"√625",a:"25"},
{q:"15 × 14",a:"210"},
{q:"(18 × 7) - 20",a:"106"},
{q:"7! (approx small)",a:"5040"},
{q:"2⁵ × 2³",a:"256"},
{q:"81 ÷ 9 × 6",a:"54"},
{q:"(50 × 3) + 25",a:"175"},
{q:"√900",a:"30"},
{q:"99 × 11",a:"1089"}
],

expert: [
{q:"(12² - 8²)",a:"80"},
{q:"3³ + 4³",a:"91"},
{q:"15% of 480",a:"72"},
{q:"2⁸",a:"256"},
{q:"(144 ÷ 12) × 7",a:"84"},
{q:"√2025",a:"45"},
{q:"7! ÷ 120",a:"42"},
{q:"(25² - 15²)",a:"400"},
{q:"3x + 7 = 34, x=?",a:"9"},
{q:"(18 × 12) ÷ 6",a:"36"}
]
};

// ===== GAME VARIABLES =====
let questions = [];
let current = 0;
let score = 0;
let xp = 0;
let level = 1;
let time = 300;
let timer;

// ===== SHUFFLE =====
function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*i);
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

// ===== START GAME =====
function startQuiz(){

let diff = document.getElementById("difficulty").value;

questions = shuffle([...bank[diff]]).slice(0,10);

document.getElementById("welcomeScreen").style.display="none";
document.getElementById("quizScreen").style.display="block";

startTimer();
showQuestion();
}

// ===== TIMER =====
function startTimer(){

timer = setInterval(()=>{

let m = Math.floor(time/60);
let s = time%60;
if(s<10) s="0"+s;

document.getElementById("timer").innerText = m+":"+s;

time--;

if(time<0){
clearInterval(timer);
showResult();
}

},1000);
}

// ===== QUESTION =====
function showQuestion(){

let q = questions[current];

document.getElementById("question").innerText =
"Q"+(current+1)+": "+q.q;

document.getElementById("options").innerHTML="";

document.getElementById("feedback").innerHTML="";

document.getElementById("nextBtn").style.display="none";

let opts = [q.a];

while(opts.length<4){
opts.push(String(Math.floor(Math.random()*100)));
}

shuffle(opts);

opts.forEach(o=>{
document.getElementById("options").innerHTML +=
`<button onclick="checkAnswer('${o}')">${o}</button>`;
});

updateProgress();
}

// ===== ANSWER =====
function checkAnswer(ans){

let correct = questions[current].a;

if(ans === correct){
score++;
xp += 10;

document.getElementById("feedback").innerHTML =
"✅ Correct!";
}
else{
document.getElementById("feedback").innerHTML =
"❌ Wrong! Answer: "+correct;
}

document.getElementById("nextBtn").style.display="block";

updateStats();
}

// ===== NEXT =====
function nextQuestion(){

current++;

if(current < questions.length){
showQuestion();
}else{
showResult();
}
}

// ===== STATS =====
function updateStats(){

level = Math.floor(xp/50)+1;

document.getElementById("scoreBox").innerText =
`Score: ${score} | XP: ${xp} | Level: ${level}`;
}

// ===== PROGRESS =====
function updateProgress(){

let p = ((current)/questions.length)*100;
document.getElementById("progress").style.width = p+"%";
}

// ===== RESULT =====
function showResult(){

clearInterval(timer);

document.getElementById("quizScreen").style.display="none";

let percent = Math.round((score/questions.length)*100);

if(score > highScore){
highScore = score;
localStorage.setItem("highScore", highScore);
}

let msg = "";

if(percent >= 90) msg = "🏆 Math Legend";
else if(percent >= 70) msg = "🔥 Excellent";
else if(percent >= 50) msg = "👍 Good Job";
else msg = "📚 Keep Practicing";

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML = `
<h2>Quiz Finished</h2>
<p>Score: ${score}/${questions.length}</p>
<p>XP: ${xp}</p>
<p>Level: ${level}</p>
<p>${msg}</p>

<button onclick="location.reload()">Play Again</button>
`;
}

</script>

</body>
</html>
